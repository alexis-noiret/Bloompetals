<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – BloomPetals</title>

    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Pacifico&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styleflower.css">

</head>
<body>

    <header>
        <nav>
            <div class="logo">BloomPetals</div>

            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="entreprise.html">Qui sommes-nous ?</a></li>
                <li><a href="realisation.html">Nos réalisations</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>

            <input type="text" class="search" placeholder="">
        </nav>
    </header>
<img src="image/photoequipe6.jpg" 
     alt="Fleur décorative BloomPetals"
     class="contact-image">

        <section class="contact-section">
            <h1>Contactez-nous</h1>
            <p>N'hésitez pas à nous envoyer un message pour toute demande d'information ou devis.</p>

            <form class="contact-form">

                <label for="civilite">Civilité :</label>
                <select id="civilite" name="civilite" required>
                    <option value="" disabled selected>Choisir votre civilité</option>
                    <option value="madame">Madame</option>
                    <option value="monsieur">Monsieur</option>
                    <option value="autre">Autre</option>
                </select>

                <label for="nom">Nom :</label>
                <input type="text" id="nom" name="nom" placeholder="Votre nom" required>

                <label for="prenom">Prénom :</label>
                <input type="text" id="prenom" name="prenom" placeholder="Votre prénom" required>

                <label for="adresse">Adresse :</label>
                <textarea id="adresse" name="adresse" placeholder="Votre adresse" required></textarea>

                <div class="checkbox-container">
                    <input type="checkbox" id="confidentialite" required>
                    <label for="confidentialite">J'accepte la politique de confidentialité de l’entreprise.</label>
                </div>

                <button type="submit">Envoyer</button>

            </form>
        </section>

</body>
</html>
